# POC: point repoURL and targetRevision to your Git remote after pushing this repo.
# Argo CD expects this CR applied in the argocd namespace.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secureforge-ui
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/k8s-manifests.git
    targetRevision: HEAD
    path: k8s-manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: secureforge
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

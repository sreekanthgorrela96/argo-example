# Example: private Git over HTTPS (replace values; store as SealedSecret/ExternalSecret in real enterprise setups).
# kubectl apply -n argocd -f repository-secret.example.yaml
apiVersion: v1
kind: Secret
metadata:
  name: secureforge-manifests-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: https://github.com/your-org/k8s-manifests.git
  password: your-pat-or-password
  username: your-username

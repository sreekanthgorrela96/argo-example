# Enterprise: scope repos/namespaces allowed for the secureforge team.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: secureforge
  namespace: argocd
spec:
  description: SecureForge applications
  sourceRepos:
    - https://github.com/your-org/k8s-manifests.git
  destinations:
    - namespace: secureforge
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

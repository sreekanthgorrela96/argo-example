# Local Jenkins for Argo CD GitOps POC (Docker Desktop on Windows/macOS/Linux).
# UI: http://localhost:8081
#
# IMPORTANT: Jenkins runs as user `jenkins`, not root. The Docker socket is typically
# root:docker (mode 660). Set DOCKER_GID to the socket's group id on the host.
# Use scripts/jenkins-up.ps1 or copy .env.example -> .env after setting DOCKER_GID.

services:
  jenkins:
    build:
      context: ./docker/jenkins
      dockerfile: Dockerfile
    image: secureforge-jenkins:poc
    container_name: jenkins-argocd-poc
    restart: unless-stopped
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      # Host Docker socket group; scripts/jenkins-up.ps1 writes .env — or set DOCKER_GID manually
      # Default 0 matches many Docker Desktop setups; Linux often uses 999 — always prefer auto-detect via jenkins-up.ps1 / .env
      - "${DOCKER_GID:-0}"
    environment:
      TZ: UTC

volumes:
  jenkins_home:
